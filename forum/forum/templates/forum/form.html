{% extends "forum/base.html" %}
{% load static from staticfiles %}
{% load bootstrap3 %}
{% block body %}
<div class="row">
  <div class="col-md-8">
    <h1>Edit</h1>

    {% bootstrap_messages %}
    <div >

      <form id="form" action="" method="post" class="form" enctype="multipart/form-data" >
        {% csrf_token %}

        {% bootstrap_form_errors form %}
        {% bootstrap_form form %}

        {% buttons %}
          <button type="submit" class="btn btn-primary">
            {% bootstrap_icon "star" %} Submit
          </button>
          <span id="bst"></span>
        {% endbuttons %}

      </form>
    </div>
  </div>
  <div class="col-md-4">
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/add_topic.js' %}"></script>
{% endblock %}
